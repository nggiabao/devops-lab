AWSTemplateFormatVersion: '2010-09-09'
Description: 'NT548-Lab01 - NAT Gateway Module'

Parameters:
  ProjectName:
    Type: String
    Default: nt548-lab01

Resources:
  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat-eip'

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId:
        Fn::ImportValue: !Sub '${ProjectName}-PublicSubnetId'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-nat-gw'
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  NatGatewayId:
    Value: !Ref NatGateway
    Export:
      Name: !Sub '${ProjectName}-NatGatewayId'

  NatEIP:
    Value: !Ref NatEIP
    Export:
      Name: !Sub '${ProjectName}-NatEIP'